<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coretan Online EXE Education Centre</title>

    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Konfigurasi Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            pink: '#d81b60',
                            orange: '#f57c00',
                            yellow: '#fbc02d',
                            dark: '#1f2022'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Memastikan warna background dan border tercetak di kertas */
        body {
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        /* Konfigurasi Kertas A4 */
        @page {
            size: A4 portrait;
            margin: 15mm;
        }

        /* Efek tampilan "kertas" saat dilihat di web/browser */
        .kertas-a4 {
            width: 210mm;
            min-height: 297mm;
            background: white;
            margin: 0 auto;
            padding: 20mm;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            position: relative;
            background-color: #ffffff;
        }

        /* Gradasi EXE Khusus Border */
        .border-gradient-brand {
            border-image: linear-gradient(135deg, #d81b60 0%, #f57c00 50%, #fbc02d 100%) 1;
        }

        .text-gradient-brand {
            background: linear-gradient(135deg, #d81b60 0%, #f57c00 50%, #fbc02d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- CSS BARU UNTUK GAMBAR FALLBACK --- */
        .print-fallback {
            display: none; /* Sembunyikan di web normal */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Supaya tidak mengganggu saat mau coret-coret */
            z-index: 10;
        }

        /* Saat dicetak, aktifkan trik khusus tabel agar header & footer berulang */
        @media print {
            body {
                background-color: white !important;
            }
            #pages-container {
                gap: 0 !important;
            }
            .kertas-a4 {
                box-shadow: none !important;
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
                height: 100% !important;
                page-break-after: always;
                break-after: page;
            }
            .kertas-a4:last-child {
                page-break-after: auto;
                break-after: auto;
            }

            .no-print {
                display: none !important;
            }

            input::placeholder {
                color: transparent !important;
            }

            thead { display: table-header-group; }
            tfoot { display: table-footer-group; }
            
            /* Sembunyikan grid outline kanvas dan pastikan ukuran fit di print */
            .canvas-container {
                border: none !important;
                box-shadow: none !important;
                height: 200mm !important;
                width: 100% !important;
                overflow: hidden !important;
                margin: 0 !important;
                padding: 0 !important;
                display: block !important;
                position: relative !important;
            }

            /* MATIKAN KANVAS ASLI, NYALAKAN GAMBAR CETAKAN */
            canvas.drawing-board {
                display: none !important;
            }

            .print-fallback {
                display: block !important;
                width: 100% !important;
                height: 100% !important;
            }
        }

        .tool-btn.active {
            background-color: #d81b60;
            color: white;
            border-color: #d81b60;
        }
        .color-btn.active {
            transform: scale(1.2);
            box-shadow: 0 0 0 2px white, 0 0 0 4px #d81b60;
        }
    </style>
</head>
<body class="bg-gray-100 py-10 text-gray-800 font-sans">

    <!-- TOOLBAR (Hanya tampil di web, hilang saat print) -->
    <div class="max-w-[210mm] mx-auto mb-6 bg-white rounded-xl shadow-md p-4 flex flex-wrap items-center justify-between gap-4 no-print border border-gray-200 sticky top-4 z-50">
        
        <div class="flex items-center gap-2 flex-wrap">
            <button class="tool-btn active w-10 h-10 rounded-lg border border-gray-300 flex items-center justify-center hover:bg-gray-100 transition-colors" id="pen" title="Pulpen">
                <i class="fas fa-pen"></i>
            </button>
            <button class="tool-btn w-10 h-10 rounded-lg border border-gray-300 flex items-center justify-center hover:bg-gray-100 transition-colors" id="eraser" title="Penghapus">
                <i class="fas fa-eraser"></i>
            </button>
            <div class="w-px h-8 bg-gray-300 mx-1"></div>
            <button class="tool-btn w-10 h-10 rounded-lg border border-gray-300 flex items-center justify-center hover:bg-gray-100 transition-colors" id="line" title="Garis Lurus">
                <i class="fas fa-minus transform -rotate-45"></i>
            </button>
            <button class="tool-btn w-10 h-10 rounded-lg border border-gray-300 flex items-center justify-center hover:bg-gray-100 transition-colors" id="rect" title="Persegi Panjang">
                <i class="far fa-square"></i>
            </button>
            <button class="tool-btn w-10 h-10 rounded-lg border border-gray-300 flex items-center justify-center hover:bg-gray-100 transition-colors" id="circle" title="Lingkaran">
                <i class="far fa-circle"></i>
            </button>
            <button class="tool-btn w-10 h-10 rounded-lg border border-gray-300 flex items-center justify-center hover:bg-gray-100 transition-colors" id="triangle" title="Segitiga">
                <i class="fas fa-caret-up text-xl transform translate-y-0.5"></i>
            </button>
            <div class="w-px h-8 bg-gray-300 mx-1"></div>
            <button class="w-10 h-10 rounded-lg border border-gray-300 flex items-center justify-center hover:bg-red-50 text-red-500 transition-colors" id="clear-canvas" title="Bersihkan Kertas">
                <i class="fas fa-trash-alt"></i>
            </button>

            <!-- Tombol Tambah Halaman -->
            <div class="w-px h-8 bg-gray-300 mx-1"></div>
            <button id="add-page-btn" class="bg-blue-50 text-blue-600 px-4 py-2 rounded-lg font-bold shadow-sm hover:bg-blue-100 transition-colors flex items-center border border-blue-200 ml-2" title="Tambah Halaman Baru">
                <i class="fas fa-plus mr-2"></i> Hal. Baru
            </button>
        </div>

        <!-- Pilihan Warna & Tombol Print -->
        <div class="flex items-center gap-6 mt-4 md:mt-0">
            <div class="flex items-center gap-3">
                <button class="color-btn active w-8 h-8 rounded-full bg-black transition-transform" data-color="#000000" title="Hitam"></button>
                <button class="color-btn w-8 h-8 rounded-full bg-red-600 transition-transform" data-color="#dc2626" title="Merah"></button>
                <button class="color-btn w-8 h-8 rounded-full bg-blue-600 transition-transform" data-color="#2563eb" title="Biru"></button>
                <button class="color-btn w-8 h-8 rounded-full bg-green-600 transition-transform" data-color="#16a34a" title="Hijau"></button>
            </div>
            
            <button id="btn-print" class="bg-gradient-to-r from-brand-pink to-brand-orange text-white px-6 py-2.5 rounded-full font-bold shadow-md hover:shadow-lg hover:-translate-y-0.5 transition-all flex items-center">
                <i class="fas fa-print mr-2"></i> Print PDF
            </button>
        </div>
    </div>

    <!-- KONTAINER SEMUA HALAMAN KERTAS -->
    <div id="pages-container" class="flex flex-col gap-10">
        <!-- HALAMAN 1 -->
        <div class="kertas-a4 rounded-xl print:rounded-none">
            <table class="w-full border-collapse">
                <thead>
                    <tr>
                        <td class="pb-8">
                            <header class="flex justify-between items-end border-b-4 border-b-brand-pink pb-4">
                                <div class="flex items-center gap-4">
                                    <img src="https://images2.imgbox.com/ad/c5/3XFVIZZN_o.png" alt="Logo EXE" class="h-12 object-contain" onerror="this.src='https://placehold.co/150x60/ffffff/d81b60?text=EXE+LOGO'">
                                    <div class="pl-4 border-l-2 border-gray-200">
                                        <h1 class="text-2xl font-extrabold text-brand-dark leading-tight">CORETAN ONLINE</h1>
                                        <div class="flex items-end gap-2 mt-1">
                                            <span class="text-sm font-bold text-gray-700">Topik:</span>
                                            <input type="text" class="border-0 border-b-2 border-gray-400 bg-transparent focus:ring-0 focus:outline-none focus:border-brand-pink text-sm font-semibold text-brand-orange uppercase tracking-wider w-64 pb-0 px-1 placeholder-gray-300" placeholder="..........................................">
                                        </div>
                                    </div>
                                </div>
                                <div class="text-right flex flex-col items-end gap-2">
                                    <div class="flex items-end gap-2">
                                        <span class="text-xs text-gray-500 font-medium">Mapel:</span>
                                        <input type="text" class="border-0 border-b border-dashed border-gray-400 bg-transparent focus:ring-0 focus:outline-none focus:border-brand-pink text-sm font-bold text-gray-800 text-center w-32 pb-0 px-1 placeholder-gray-300" placeholder="....................">
                                    </div>
                                    <div class="flex items-end gap-2">
                                        <span class="text-xs text-gray-500 font-medium">Kelas:</span>
                                        <input type="text" class="border-0 border-b border-dashed border-gray-400 bg-transparent focus:ring-0 focus:outline-none focus:border-brand-pink text-sm font-bold text-gray-800 text-center w-32 pb-0 px-1 placeholder-gray-300" placeholder="....................">
                                    </div>
                                </div>
                            </header>
                        </td>
                    </tr>
                </thead>

                <!-- TBODY: Area Kanvas Coretan -->
                <tbody>
                    <tr>
                        <td class="pb-6">
                            <!-- Canvas Container (Tinggi 200mm) -->
                            <div class="canvas-container w-full border-2 border-dashed border-gray-300 rounded-xl bg-white relative" style="height: 200mm;">
                                <!-- Image Fallback untuk cetak PDF (Akan selalu diperbarui tiap angkat pulpen) -->
                                <img class="print-fallback" alt="" />
                                <!-- Kanvas Utama -->
                                <canvas class="drawing-board w-full h-full cursor-crosshair touch-none block absolute top-0 left-0"></canvas>
                            </div>
                        </td>
                    </tr>
                </tbody>

                <tfoot>
                    <tr>
                        <td class="pt-8">
                            <footer class="pt-6 border-t-2 border-dashed border-gray-200">
                                <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                                    <div>
                                        <h3 class="text-lg font-extrabold text-brand-dark mb-1">
                                            EXE <span class="text-gradient-brand">Education Centre</span>
                                        </h3>
                                        <p class="text-xs font-medium text-gray-500 italic">"Endless Spirit of Lifelong Learner"</p>
                                    </div>
                                    <div class="flex gap-4">
                                        <div class="flex items-center gap-2 bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-100">
                                            <i class="fab fa-whatsapp text-green-500"></i>
                                            <span class="text-xs font-semibold text-gray-600">0851-4152-5668</span>
                                        </div>
                                        <div class="flex items-center gap-2 bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-100">
                                            <i class="fab fa-instagram text-brand-pink"></i>
                                            <span class="text-xs font-semibold text-gray-600">@exe_educentre</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="h-2 w-full bg-gradient-to-r from-brand-pink via-brand-orange to-brand-yellow rounded-full mt-4 opacity-70"></div>
                            </footer>
                        </td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <!-- SCRIPT UNTUK WHITEBOARD -->
    <script>
        const toolBtns = document.querySelectorAll(".tool-btn");
        const colorBtns = document.querySelectorAll(".color-btn");
        const clearBtn = document.getElementById("clear-canvas");
        const printBtn = document.getElementById("btn-print");
        const addPageBtn = document.getElementById("add-page-btn");
        const pagesContainer = document.getElementById("pages-container");

        let isDrawing = false;
        let selectedTool = "pen";
        let brushWidth = 3;
        let selectedColor = "#000000";
        let prevMouseX, prevMouseY, snapshot;
        let currentCanvas = null;
        let currentCtx = null;

        // --- SISTEM AUTO-SYNC KE GAMBAR CETAK ---
        // Fungsi ini langsung menyimpan hasil gambar setiap kita ngangkat pulpen.
        // Jadinya pas Ctrl+P ditekan, gambarnya udah 100% jadi. Gak ada lagi acara telat ngerender.
        const syncCanvasToImage = (canvas) => {
            const container = canvas.closest('.canvas-container');
            if(!container) return;
            const img = container.querySelector('.print-fallback');
            if(img) {
                // Konversi langsung jadi JPEG
                img.src = canvas.toDataURL('image/jpeg', 1.0);
            }
        };

        printBtn.addEventListener("click", () => {
            // Karena gambar udah disinkron tiap ngangkat pulpen, kita tinggal panggil print!
            window.print(); 
        });

        const getMousePos = (canvas, evt) => {
            const rect = canvas.getBoundingClientRect();
            let clientX = evt.clientX;
            let clientY = evt.clientY;

            if (evt.touches && evt.touches.length > 0) {
                clientX = evt.touches[0].clientX;
                clientY = evt.touches[0].clientY;
            } else if (evt.changedTouches && evt.changedTouches.length > 0) {
                clientX = evt.changedTouches[0].clientX;
                clientY = evt.changedTouches[0].clientY;
            }

            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        };

        const setupCanvas = (canvas) => {
            const ctx = canvas.getContext("2d", { willReadFrequently: true });
            const rect = canvas.parentElement.getBoundingClientRect();
            
            const w = rect.width || 642; 
            const h = rect.height || 756;

            const dpr = window.devicePixelRatio && window.devicePixelRatio > 1 ? window.devicePixelRatio : 2;
            
            canvas.width = w * dpr;
            canvas.height = h * dpr;
            ctx.scale(dpr, dpr);
            
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, w, h);

            canvas.onmousedown = startDraw;
            canvas.onmousemove = drawing;
            canvas.onmouseup = stopDraw;
            canvas.onmouseleave = stopDraw;

            canvas.ontouchstart = (e) => { e.preventDefault(); startDraw(e); };
            canvas.ontouchmove = (e) => { e.preventDefault(); drawing(e); };
            canvas.ontouchend = stopDraw;

            // Simpan gambar kanvas kosong putih ini untuk PDF
            syncCanvasToImage(canvas);
        };

        window.addEventListener("load", () => {
            setTimeout(() => {
                const initialCanvas = document.querySelector(".drawing-board");
                setupCanvas(initialCanvas);
            }, 150);
        });

        addPageBtn.addEventListener("click", () => {
            const firstPage = pagesContainer.querySelector(".kertas-a4");
            const newPage = firstPage.cloneNode(true);
            
            const oldInputs = firstPage.querySelectorAll("input");
            const newInputs = newPage.querySelectorAll("input");
            newInputs.forEach((input, index) => { input.value = oldInputs[index].value; });

            const newCanvas = newPage.querySelector(".drawing-board");
            
            pagesContainer.appendChild(newPage);
            setupCanvas(newCanvas);
            newPage.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });

        toolBtns.forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelector(".tool-btn.active").classList.remove("active");
                btn.classList.add("active");
                selectedTool = btn.id;
            });
        });

        colorBtns.forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelector(".color-btn.active").classList.remove("active");
                btn.classList.add("active");
                selectedColor = window.getComputedStyle(btn).getPropertyValue("background-color");
            });
        });

        clearBtn.addEventListener("click", () => {
            if(confirm("Hapus semua coretan di halaman?")) {
                const allCanvases = document.querySelectorAll(".drawing-board");
                allCanvases.forEach(cvs => { 
                    setupCanvas(cvs); 
                });
            }
        });

        const drawRect = (pos, ctx) => { ctx.strokeRect(pos.x, pos.y, prevMouseX - pos.x, prevMouseY - pos.y); }
        const drawCircle = (pos, ctx) => {
            ctx.beginPath();
            let radius = Math.sqrt(Math.pow((prevMouseX - pos.x), 2) + Math.pow((prevMouseY - pos.y), 2));
            ctx.arc(prevMouseX, prevMouseY, radius, 0, 2 * Math.PI);
            ctx.stroke();
        }
        const drawTriangle = (pos, ctx) => {
            ctx.beginPath();
            ctx.moveTo(prevMouseX, prevMouseY);
            ctx.lineTo(pos.x, pos.y);
            ctx.lineTo(prevMouseX * 2 - pos.x, pos.y);
            ctx.closePath();
            ctx.stroke();
        }
        const drawLine = (pos, ctx) => {
            ctx.beginPath();
            ctx.moveTo(prevMouseX, prevMouseY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        const startDraw = (e) => {
            currentCanvas = e.target;
            currentCtx = currentCanvas.getContext("2d");
            isDrawing = true;
            
            const pos = getMousePos(currentCanvas, e);
            prevMouseX = pos.x;
            prevMouseY = pos.y;
            
            currentCtx.beginPath();
            currentCtx.moveTo(pos.x, pos.y);
            currentCtx.lineWidth = selectedTool === "eraser" ? 30 : brushWidth;
            currentCtx.strokeStyle = selectedTool === "eraser" ? "#ffffff" : selectedColor;
            currentCtx.fillStyle = selectedTool === "eraser" ? "#ffffff" : selectedColor;
            currentCtx.lineCap = "round"; 
            currentCtx.lineJoin = "round";
            
            snapshot = currentCtx.getImageData(0, 0, currentCanvas.width, currentCanvas.height);
        }

        const drawing = (e) => {
            if(!isDrawing || !currentCtx || !currentCanvas) return;
            
            const pos = getMousePos(currentCanvas, e);

            if (selectedTool !== "pen" && selectedTool !== "eraser") {
                if (snapshot) currentCtx.putImageData(snapshot, 0, 0); 
            }

            if(selectedTool === "pen" || selectedTool === "eraser") {
                currentCtx.lineTo(pos.x, pos.y);
                currentCtx.stroke();
            } else if(selectedTool === "rect"){
                drawRect(pos, currentCtx);
            } else if(selectedTool === "circle"){
                drawCircle(pos, currentCtx);
            } else if(selectedTool === "triangle"){
                drawTriangle(pos, currentCtx);
            } else if(selectedTool === "line"){
                drawLine(pos, currentCtx);
            }
        }

        const stopDraw = () => { 
            if (isDrawing) {
                isDrawing = false;
                // KUNCI UTAMANYA DISINI: 
                // Begitu lepas klik/sentuhan, langsung simpan gambar terbaru!
                if (currentCanvas) {
                    syncCanvasToImage(currentCanvas);
                }
            }
        }
    </script>
</body>
</html>
